<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp (Light)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-deep:       #efeae2;
    --bg-sidebar:    #ffffff;
    --bg-panel:      #f0f2f5;
    --bg-input:      #f0f2f5;
    --bg-sent:       #d9fdd3;
    --bg-recv:       #ffffff;
    --bg-hover:      #f5f6f6;
    --accent:        #25d366;
    --accent-dark:   #128c7e;
    --text-primary:  #111b21;
    --text-secondary:#54656f;
    --divider:       #e9edef;
    --icon-color:    #54656f;
    --tick-blue:     #53bdeb;
    --font:          'Segoe UI', system-ui, -apple-system, sans-serif;
  }
  html, body { height: 100%; background: var(--bg-deep); font-family: var(--font); overflow: hidden; }
  #app { display: flex; height: 100vh; width: 100%; }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 420px; min-width: 320px; max-width: 420px;
    display: flex; flex-direction: column;
    background: var(--bg-sidebar); border-right: 1px solid var(--divider);
  }
  #sidebar-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; background: var(--bg-panel); height: 60px;
  }
  #my-avatar {
    width: 40px; height: 40px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; color: #fff; cursor: pointer; user-select: none; flex-shrink: 0;
  }
  .header-icons { display: flex; gap: 6px; }
  .icon-btn {
    width: 40px; height: 40px; border-radius: 50%; background: none; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s; color: var(--icon-color);
  }
  .icon-btn:hover { background: var(--bg-hover); }
  #search-wrap { padding: 8px 12px; background: var(--bg-sidebar); }
  #search-inner {
    display: flex; align-items: center; gap: 10px;
    background: var(--bg-input); border-radius: 8px; padding: 0 12px; height: 35px;
  }
  #search-inner svg { flex-shrink: 0; color: var(--text-secondary); }
  #search-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-primary); font-size: 15px; font-family: var(--font); caret-color: var(--accent);
  }
  #search-input::placeholder { color: var(--text-secondary); }
  #filter-tabs {
    display: flex; gap: 8px; padding: 4px 12px 8px;
    background: var(--bg-sidebar); overflow-x: auto; scrollbar-width: none;
  }
  #filter-tabs::-webkit-scrollbar { display: none; }
  .filter-tab {
    flex-shrink: 0; padding: 5px 12px; border-radius: 16px; border: none;
    font-size: 13px; font-family: var(--font); cursor: pointer;
    transition: background 0.15s, color 0.15s; background: var(--bg-input); color: var(--text-secondary);
  }
  .filter-tab.active { background: rgba(37,211,102,0.12); color: var(--accent); }
  #chat-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--bg-input) transparent; }
  #chat-list::-webkit-scrollbar { width: 6px; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 3px; }
  .chat-item {
    display: flex; align-items: center; padding: 10px 16px; gap: 12px;
    cursor: pointer; transition: background 0.1s; position: relative;
  }
  .chat-item:hover { background: var(--bg-hover); }
  .chat-item.selected { background: var(--bg-input); }
  .chat-item.selected::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent);
  }
  .chat-avatar {
    width: 49px; height: 49px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; color: #fff; flex-shrink: 0;
  }
  .chat-body { flex: 1; min-width: 0; }
  .chat-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .chat-name {
    font-size: 16px; color: var(--text-primary); font-weight: 400;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 220px;
  }
  .chat-time { font-size: 12px; color: var(--text-secondary); flex-shrink: 0; margin-left: 8px; }
  .chat-item.unread .chat-time { color: var(--accent); }
  .chat-bottom { display: flex; justify-content: space-between; align-items: center; }
  .chat-preview {
    font-size: 14px; color: var(--text-secondary); white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; max-width: 260px;
    display: flex; align-items: center; gap: 4px;
  }
  .unread-badge {
    min-width: 20px; height: 20px; background: var(--accent); border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #fff; padding: 0 5px; flex-shrink: 0;
  }

  /* ── MAIN ── */
  #main {
    flex: 1; display: flex; flex-direction: column;
    background: var(--bg-deep); position: relative; overflow: hidden;
    transition: flex 0.22s cubic-bezier(0.2,0,0,1);
  }
  #main::before {
    content: ''; position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23c9bfaa'%3E%3Cpath d='M10 10 Q15 5 20 10 Q15 15 10 10z' opacity='.4'/%3E%3Cpath d='M50 30 Q55 25 60 30 Q55 35 50 30z' opacity='.3'/%3E%3Cpath d='M90 15 Q95 10 100 15 Q95 20 90 15z' opacity='.35'/%3E%3Cpath d='M140 25 Q145 20 150 25 Q145 30 140 25z' opacity='.4'/%3E%3Cpath d='M180 10 Q185 5 190 10 Q185 15 180 10z' opacity='.3'/%3E%3Cpath d='M230 20 Q235 15 240 20 Q235 25 230 20z' opacity='.35'/%3E%3Cpath d='M270 8 Q275 3 280 8 Q275 13 270 8z' opacity='.4'/%3E%3Cpath d='M30 60 Q35 55 40 60 Q35 65 30 60z' opacity='.35'/%3E%3Cpath d='M70 50 Q75 45 80 50 Q75 55 70 50z' opacity='.4'/%3E%3Cpath d='M200 60 Q205 55 210 60 Q205 65 200 60z' opacity='.35'/%3E%3C/g%3E%3C/svg%3E");
    background-size: 400px 400px; opacity: 0.5; pointer-events: none; z-index: 0;
  }
  #chat-header {
    display: flex; align-items: center; padding: 10px 16px;
    background: var(--bg-panel); height: 60px; gap: 12px;
    z-index: 10; position: relative; border-bottom: 1px solid var(--divider);
  }
  #active-avatar {
    width: 40px; height: 40px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 600; color: #fff;
    flex-shrink: 0; cursor: pointer;
  }
  #contact-info { flex: 1; cursor: pointer; min-width: 0; }
  #contact-name { font-size: 16px; color: var(--text-primary); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  #contact-status { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }
  .chat-header-icons { display: flex; gap: 4px; }
  #messages {
    flex: 1; overflow-y: auto; padding: 12px 6% 12px;
    display: flex; flex-direction: column; gap: 16px;
    position: relative; z-index: 1;
    scrollbar-width: thin; scrollbar-color: var(--bg-input) transparent;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 2px; }
  .date-separator { display: flex; align-items: center; justify-content: center; margin: 10px 0; }
  .date-chip {
    background: rgba(17,27,33,0.06); color: var(--text-secondary); font-size: 12.5px;
    padding: 5px 12px; border-radius: 8px; box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .msg-row { display: flex; margin: 1px 0; }
  .msg-row.sent { justify-content: flex-end; }
  .msg-row.recv { justify-content: flex-start; }
  .bubble {
    max-width: 65%; min-width: 80px; padding: 6px 7px 8px 9px;
    border-radius: 7.5px; position: relative; word-break: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,.1);
  }
  .msg-row.sent .bubble  { background: var(--bg-sent); border-top-right-radius: 0; }
  .msg-row.recv .bubble  { background: var(--bg-recv); border-top-left-radius: 0; }
  .msg-row.sent .bubble::after {
    content: ''; position: absolute; top: 0; right: -8px;
    width: 0; height: 0; border-style: solid;
    border-width: 0 0 8px 8px; border-color: transparent transparent transparent var(--bg-sent);
  }
  .msg-row.recv .bubble::before {
    content: ''; position: absolute; top: 0; left: -8px;
    width: 0; height: 0; border-style: solid;
    border-width: 0 8px 8px 0; border-color: transparent var(--bg-recv) transparent transparent;
  }
  .bubble-text { font-size: 14.2px; color: var(--text-primary); line-height: 1.45; padding-right: 70px; }
  .bubble-meta {
    display: flex; align-items: center; justify-content: flex-end;
    gap: 3px; margin-top: 2px; float: right; clear: both; margin-left: 8px;
  }
  .msg-time { font-size: 11px; color: rgba(17,27,33,0.45); white-space: nowrap; }
  .msg-row.recv .msg-time { color: var(--text-secondary); }
  .tick { display: flex; align-items: center; }
  .msg-row.sent + .msg-row.recv, .msg-row.recv + .msg-row.sent { margin-top: 6px; }
  .bubble.emoji-only .bubble-text { font-size: 32px; padding-right: 48px; line-height: 1.2; }
  #input-area {
    display: flex; align-items: flex-end; padding: 8px 16px 10px; gap: 10px;
    background: var(--bg-panel); position: relative; z-index: 10;
  }
  #input-wrap {
    flex: 1; display: flex; align-items: flex-end;
    background: var(--bg-input); border-radius: 10px; padding: 6px 10px; gap: 8px; min-height: 42px;
  }
  #msg-input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-primary); font-size: 15px; font-family: var(--font);
    resize: none; max-height: 140px; overflow-y: auto; line-height: 1.5;
    caret-color: var(--accent); padding: 3px 0;
  }
  #msg-input::placeholder { color: var(--text-secondary); }
  .input-icon-btn {
    background: none; border: none; cursor: pointer; color: var(--icon-color);
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%; transition: color 0.15s; flex-shrink: 0;
  }
  .input-icon-btn:hover { color: var(--text-primary); }
  #send-btn {
    width: 42px; height: 42px; border-radius: 50%; background: var(--accent); border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(37,211,102,.25);
  }
  #send-btn:hover { background: var(--accent-dark); }
  #send-btn:active { transform: scale(0.94); }
  #send-btn svg { color: #fff; }
  #welcome {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 20px;
    z-index: 1; position: relative; text-align: center;
  }
  #welcome h2 { font-size: 32px; color: var(--text-primary); font-weight: 300; opacity: 0.9; }
  #welcome p { font-size: 14px; color: var(--text-secondary); max-width: 360px; line-height: 1.7; }
  #welcome-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.6; } }
  .typing-indicator { display: flex; gap: 4px; align-items: center; padding: 4px 0; }
  .typing-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--text-secondary);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }
  #emoji-picker {
    position: absolute; bottom: 65px; left: 16px;
    background: var(--bg-panel); border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5); padding: 12px;
    display: none; z-index: 100; width: 320px; border: 1px solid var(--divider);
  }
  #emoji-picker.open { display: block; animation: popUp 0.15s ease; }
  @keyframes popUp { from { opacity:0; transform:scale(0.95) translateY(8px); } to { opacity:1; transform:none; } }
  .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 4px; }
  .emoji-btn {
    background: none; border: none; font-size: 22px; cursor: pointer;
    padding: 6px; border-radius: 6px; transition: background 0.12s; text-align: center;
  }
  .emoji-btn:hover { background: var(--bg-hover); }
  @keyframes fadeSlideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  /* Reactions */
  .reaction-bar {
    position: absolute; bottom: 100%; right: 0; margin-bottom: -6px;
    background: #fff; border: 1px solid #e9edef; border-radius: 24px;
    padding: 4px 8px; display: none; gap: 4px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 10; white-space: nowrap;
  }
  .bubble:hover .reaction-bar { display: flex; }
  .rbtn { font-size: 22px; cursor: pointer; padding: 2px 3px; border-radius: 8px; transition: transform 0.15s; background: none; border: none; }
  .rbtn:hover { transform: scale(1.25); }
  .reaction-badge {
    position: absolute; bottom: -16px; right: 6px;
    background: #fff; border: 1px solid #e9edef; border-radius: 12px;
    padding: 1px 6px; font-size: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
  }
  .msg-row.new { animation: fadeSlideIn 0.18s ease forwards; }
  .status-dot {
    width: 10px; height: 10px; border-radius: 50%;
    position: absolute; bottom: 1px; right: 1px; border: 2px solid var(--bg-panel);
  }
  .status-dot.online  { background: var(--accent); }
  .status-dot.away    { background: #f0c047; }
  .avatar-wrap { position: relative; flex-shrink: 0; }
  .back-btn { display: none; }
  @media (max-width: 768px) {
    #sidebar { width: 100%; max-width: 100%; }
    #main { display: none; }
    #sidebar.hide { display: none; }
    #main.show { display: flex; width: 100%; }
    #chat-header .back-btn { display: flex !important; }
    #profile-panel.open { width: 100%; min-width: 100%; position: absolute; z-index: 20; }
  }

  /* ── PROFILE PANEL ── */
  #profile-panel {
    width: 0; min-width: 0; overflow: hidden;
    background: var(--bg-sidebar);
    border-left: 1px solid var(--divider);
    display: flex; flex-direction: column;
    transition: width 0.22s cubic-bezier(0.2,0,0,1), min-width 0.22s cubic-bezier(0.2,0,0,1);
  }
  #profile-panel.open { width: 420px; min-width: 420px; }
  #profile-inner {
    width: 420px; height: 100%; overflow-y: auto;
    display: flex; flex-direction: column;
    scrollbar-width: thin; scrollbar-color: var(--bg-input) transparent;
  }
  #profile-inner::-webkit-scrollbar { width: 4px; }
  #profile-inner::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); }

  /* Profile header */
  #profile-panel-header {
    display: flex; align-items: center; gap: 20px; padding: 0 6px 0 4px;
    height: 60px; background: var(--bg-panel); flex-shrink: 0;
    border-bottom: 1px solid var(--divider);
  }
  #profile-panel-title { font-size: 16px; color: var(--text-primary); font-weight: 400; }

  /* Hero */
  #profile-hero {
    background: var(--bg-panel); padding: 24px 20px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    flex-shrink: 0;
  }
  .prof-av-xl {
    width: 200px; height: 200px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 72px; font-weight: 600; color: #fff;
    position: relative; cursor: pointer; overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,.4); flex-shrink: 0;
  }
  .prof-av-xl .av-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,.45);
    border-radius: 50%; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 6px;
    opacity: 0; transition: opacity 0.2s;
  }
  .prof-av-xl:hover .av-overlay { opacity: 1; }
  .av-overlay span { font-size: 13px; color: #fff; font-weight: 500; letter-spacing: 0.3px; }
  #prof-name { font-size: 24px; font-weight: 500; color: var(--text-primary); text-align: center; margin-top: 4px; }
  #prof-sub  { font-size: 14px; color: var(--text-secondary); text-align: center; }

  /* Sections */
  .prof-section { background: var(--bg-panel); margin-top: 10px; flex-shrink: 0; }
  .prof-section-label {
    padding: 14px 20px 4px; font-size: 13px; color: var(--accent);
  }
  .prof-about-text {
    padding: 4px 20px 14px; font-size: 15px; color: var(--text-primary); line-height: 1.5;
  }

  /* Info rows (phone, email) */
  .prof-info-row {
    display: flex; align-items: center; gap: 16px; padding: 12px 20px;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .prof-info-row:last-child { border-bottom: none; }
  .prof-info-icon { color: var(--text-secondary); display: flex; flex-shrink: 0; }
  .prof-info-body { flex: 1; }
  .prof-info-val { font-size: 15px; color: var(--text-primary); }
  .prof-info-lbl { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .prof-copy-btn {
    background: none; border: none; cursor: pointer; color: var(--text-secondary);
    display: flex; padding: 6px; border-radius: 50%; transition: background 0.12s, color 0.12s;
  }
  .prof-copy-btn:hover { background: var(--bg-hover); color: var(--text-primary); }

  /* Media grid */
  .prof-media-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 10px;
  }
  .prof-media-header-left { display: flex; align-items: center; gap: 8px; }
  .prof-media-title { font-size: 15px; color: var(--text-primary); }
  .prof-media-count {
    font-size: 13px; color: var(--text-secondary);
    background: var(--bg-input); padding: 2px 8px; border-radius: 10px;
  }
  .prof-media-see-all {
    background: none; border: none; cursor: pointer; color: var(--text-secondary);
    display: flex; align-items: center; gap: 4px; font-size: 13px;
    font-family: var(--font); transition: color 0.12s;
  }
  .prof-media-see-all:hover { color: var(--text-primary); }
  .prof-media-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 3px;
    padding: 0 0 4px;
  }
  .media-thumb {
    aspect-ratio: 1; overflow: hidden; cursor: pointer; transition: filter 0.15s;
    background-size: cover; background-position: center;
    display: flex; align-items: center; justify-content: center;
  }
  .media-thumb:hover { filter: brightness(0.8); }
  .media-thumb.more-overlay {
    position: relative; background: rgba(0,0,0,.6);
  }
  .media-thumb.more-overlay::after {
    content: attr(data-more); position: absolute; inset: 0;
    background: rgba(0,0,0,.55); display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 600; color: #fff;
  }

  /* Toggle rows */
  .prof-toggle-row {
    display: flex; align-items: center; gap: 16px;
    padding: 14px 20px; cursor: pointer; transition: background 0.12s;
    border-bottom: 1px solid rgba(255,255,255,.04);
  }
  .prof-toggle-row:last-child { border-bottom: none; }
  .prof-toggle-row:hover { background: var(--bg-hover); }
  .prof-toggle-icon { color: var(--text-secondary); display: flex; flex-shrink: 0; }
  .prof-toggle-body { flex: 1; }
  .prof-toggle-label { font-size: 15px; color: var(--text-primary); }
  .prof-toggle-sub { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .toggle-switch {
    width: 44px; height: 24px; background: var(--bg-input); border-radius: 12px;
    position: relative; cursor: pointer; transition: background 0.2s; border: none; flex-shrink: 0;
  }
  .toggle-switch.on { background: var(--accent); }
  .toggle-switch::after {
    content: ''; position: absolute; width: 18px; height: 18px; background: #fff;
    border-radius: 50%; top: 3px; left: 3px; transition: transform 0.2s;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }
  .toggle-switch.on::after { transform: translateX(20px); }
  .prof-arrow { color: var(--text-secondary); display: flex; }

  /* Members */
  .prof-members-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 20px 8px;
  }
  .prof-members-title { font-size: 15px; color: var(--text-primary); }
  .prof-members-count {
    font-size: 13px; color: var(--text-secondary);
    background: var(--bg-input); padding: 2px 8px; border-radius: 10px;
  }
  .prof-member-search {
    display: flex; align-items: center; gap: 8px;
    background: var(--bg-input); border-radius: 8px;
    padding: 6px 12px; margin: 0 16px 8px; height: 34px;
  }
  .prof-member-search input {
    flex: 1; background: none; border: none; outline: none;
    color: var(--text-primary); font-size: 14px; font-family: var(--font); caret-color: var(--accent);
  }
  .prof-member-search input::placeholder { color: var(--text-secondary); }
  .add-member-row {
    display: flex; align-items: center; gap: 14px; padding: 10px 20px;
    cursor: pointer; transition: background 0.12s;
  }
  .add-member-row:hover { background: var(--bg-hover); }
  .add-member-icon {
    width: 46px; height: 46px; border-radius: 50%; background: var(--accent);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .add-member-label { font-size: 15px; color: var(--text-primary); }
  .member-row {

// ── OPEN CHAT ─────────────────────────────────
function openChat(id) {
  activeChat=chats.find(c=>c.id===id);
  if(!activeChat) return;
  activeChat.unread=0;
  closeProfile();
  document.getElementById('welcome').style.display='none';
  document.getElementById('messages').style.display='flex';
  document.getElementById('input-area').style.display='flex';
  document.getElementById('chat-header').style.display='flex';
  const av=document.getElementById('active-avatar');
  av.textContent=initials(activeChat.name);
  av.style.background=color(activeChat.name);
  document.getElementById('contact-name').textContent=activeChat.name;
  document.getElementById('contact-status').textContent=
    activeChat.status==='online'?'online':
    activeChat.status==='away'?'last seen recently':
    activeChat.group?`${(activeChat.members||[]).length+1} participants`:'last seen today';
  const dot=document.getElementById('active-status-dot');
  dot.className='status-dot '+(activeChat.status==='online'?'online':activeChat.status==='away'?'away':'');
  renderMessages();
  renderChatList();
  if(window.innerWidth<=768){
    document.getElementById('sidebar').classList.add('hide');
    document.getElementById('main').classList.add('show');
  }
}

function groupByDate(msgs) {
  const g=[]; let last=null;
  msgs.forEach(m=>{
    const d=new Date(m.time); d.setHours(0,0,0,0);
    const k=d.toDateString();
    if(k!==last){
      const today=new Date(); today.setHours(0,0,0,0);
      const yest=new Date(today); yest.setDate(yest.getDate()-1);
      let lbl=d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      if(d.toDateString()===today.toDateString()) lbl='Today';
      else if(d.toDateString()===yest.toDateString()) lbl='Yesterday';
      g.push({type:'date',lbl}); last=k;
    }
    g.push({type:'msg',m});
  });
  return g;
}

}

function renderCallBubble(m) {
  const isMissed = m.status==='missed';
  const isVideo  = m.callType==='video';
  const label    = isMissed
    ? (m.from==='me' ? `Missed ${isVideo?'video':'voice'} call` : `Missed ${isVideo?'video':'voice'} call`)
    : (m.from==='me' ? `${isVideo?'Video':'Voice'} call` : `${isVideo?'Video':'Voice'} call`);
  const subLabel = isMissed
    ? 'Tap to call back'
    : `${m.from==='me'?'Outgoing':'Incoming'} · ${m.duration}`;
  const iconColor= isMissed ? '#f15c6d' : '#00a884';
  const phoneIcon=isVideo
    ? `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${iconColor}" stroke-width="2.2"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>`
    : `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="${iconColor}" stroke-width="2.2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8a19.79 19.79 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/></svg>`;
  const arrowSvg= isMissed
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#f15c6d" stroke-width="2.5"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>`
    : (m.from==='me'
        ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00a884" stroke-width="2.5"><line x1="17" y1="7" x2="7" y2="17"/><polyline points="7 7 7 17 17 17"/></svg>`
        : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#00a884" stroke-width="2.5"><line x1="7" y1="17" x2="17" y2="7"/><polyline points="7 7 17 7 17 17"/></svg>`);
  return `<div class="call-bubble">
    <div class="call-icon-wrap ${isMissed?'missed':'answered'}">${phoneIcon}</div>
    <div class="call-details">
      <div class="call-label${isMissed?' missed-lbl':''}">${label}</div>
      <div class="call-meta-row">${arrowSvg}<span>${subLabel}</span></div>
    </div>
    <button class="call-callback-btn" onclick="showToast('Calling...')" title="Call back">
      ${phoneIcon}
    </button>
  </div>
  <div style="display:flex;align-items:center;justify-content:flex-end;gap:3px;padding:0 8px 8px">
    <span style="font-size:11px;color:rgba(233,237,239,0.5)">${fmtMsgTime(m.time)}</span>${mkTick(m)}
  </div>`;
}

function renderAudioBubble(m) {
  const seeds=m.waveSeeds||[3,6,4,8,5,7,4,9,3,7,5,8,4,6,3,9,7,5,8,4,6,3,9,7,5,8,4,6,3,9];
  const bars=seeds.map((h,i)=>{
    const pct=(i/seeds.length);
    const played=pct<0.35;
    const heightPct=Math.min(100,Math.max(15,h*11));
    return `<div class="wv-bar${played?' played':''}" style="height:${heightPct}%"></div>`;
  }).join('');
  const avatarBg = m.from==='me' ? 'var(--accent)' : color(activeChat.name);
  const avatarTxt= m.from==='me' ? 'Y' : initials(activeChat.name);
  return `<div class="audio-bubble">
    <button class="audio-play-btn" onclick="playAudio(this)">

}

function renderMessages() {
  const c=document.getElementById('messages');
  c.innerHTML=groupByDate(activeChat.messages).map(item=>{
    if(item.type==='date') return `<div class="date-separator"><div class="date-chip">${item.lbl}</div></div>`;
    const m=item.m;
    const side=m.from==='me'?'sent':'recv';
    const snd=m.sender?`<div style="color:${color(m.sender)};font-size:13px;font-weight:600;margin-bottom:3px">${m.sender}</div>`:'';

    // Special bubble types
    if(m.type==='call') {
      return `<div class="msg-row ${side}"><div class="bubble" style="padding:0;overflow:hidden">${renderCallBubble(m)}</div></div>`;
    }
    if(m.type==='audio') {
      return `<div class="msg-row ${side}"><div class="bubble" style="padding:0;overflow:hidden">${renderAudioBubble(m)}</div></div>`;
    }
    if(m.type==='image') {
      return `<div class="msg-row ${side}"><div class="bubble" style="padding:0;overflow:hidden;background:transparent;box-shadow:none">${snd}<div style="background:${side==='sent'?'var(--bg-sent)':'var(--bg-recv)'};border-radius:7.5px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.3)">${renderImageBubble(m)}</div></div></div>`;
    }
    if(m.type==='video') {
      return `<div class="msg-row ${side}"><div class="bubble" style="padding:0;overflow:hidden;background:transparent;box-shadow:none">${snd}<div style="background:${side==='sent'?'var(--bg-sent)':'var(--bg-recv)'};border-radius:7.5px;overflow:hidden;box-shadow:0 1px 2px rgba(0,0,0,.3)">${renderVideoBubble(m)}</div></div></div>`;
    }

    // Text bubble
    const eo=isEmojiOnly(m.text||'');
    const tc=m.read?'#53bdeb':'#aebac1';
    const tick=m.from==='me'?`<span class="tick"><svg width="16" height="10" viewBox="0 0 18 11" fill="none">
      <polyline points="1,6 5.5,10.5 17,1" stroke="${tc}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <polyline points="5,6 9.5,10.5 17,1" stroke="${tc}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" style="transform:translateX(-3px)"/>
    </svg></span>`:'';
    const reactionBar=`<div class="reaction-bar">${REACTIONS.map(r=>`<button class="rbtn">${r}</button>`).join('')}</div>`;
    return `<div class="msg-row ${side}">
      <div class="bubble${eo?' emoji-only':''}">
        ${reactionBar}
        ${snd}
        <div class="bubble-text">${escHtml(m.text||'')}</div>
        <div class="bubble-meta"><span class="msg-time">${fmtMsgTime(m.time)}</span>${tick}</div>
      </div>
    </div>`;
  }).join('');
  c.scrollTop=c.scrollHeight;

  // Reaction click
  c.querySelectorAll('.rbtn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const bubble = btn.closest('.bubble');
      let badge = bubble.querySelector('.reaction-badge');
      if (!badge) {
        badge = document.createElement('div');
        badge.className = 'reaction-badge';
        bubble.appendChild(badge);
      }
      badge.textContent = btn.textContent + ' 1';
    });
  });
}

function sendMessage() {
  const inp=document.getElementById('msg-input');
  const txt=inp.value.trim();
  if(!txt||!activeChat) return;
  activeChat.messages.push({id:Date.now(),from:'me',text:txt,time:new Date(),read:false});
  activeChat.preview=txt; activeChat.time=new Date();
  inp.value=''; inp.style.height='auto'; closeEmoji();
  renderMessages();
  const rows=document.querySelectorAll('#messages .msg-row');
  if(rows.length) rows[rows.length-1].classList.add('new');
  renderChatList();
  if(!activeChat.group) simulateReply();
}

function playAudio(btn) {
  const isPlaying = btn.dataset.playing === '1';
  // Reset all playing buttons
  document.querySelectorAll('.audio-play-btn').forEach(b => {
    b.dataset.playing = '0';
    b.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
  });
  if (!isPlaying) {
    btn.dataset.playing = '1';
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`;
    showToast('Playing voice message...');
    setTimeout(() => {
      btn.dataset.playing = '0';
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
    }, 3000);
  }
}
function seekAudio(waveEl) {
  showToast('Seeking audio...');
}

function simulateReply() {
  setTimeout(()=>{
    const tr=document.createElement('div');
    tr.className='msg-row recv'; tr.id='typing-row';
    tr.innerHTML=`<div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    document.getElementById('messages').appendChild(tr);
    document.getElementById('messages').scrollTop=9999;
    const rs=["Got it! 👍","Sounds good!","Haha yeah 😄","For sure!","That makes sense","Oh interesting!","I'll check and get back to you","Perfect!","Sure thing! 🙌","Noted ✅"];
    setTimeout(()=>{
      const old=document.getElementById('typing-row');
      if(old) old.remove();
      const txt=rs[Math.floor(Math.random()*rs.length)];
      activeChat.messages.push({id:Date.now()+1,from:'them',text:txt,time:new Date()});
      activeChat.preview=txt; activeChat.time=new Date();
      renderMessages(); renderChatList();
    },1200+Math.random()*800);
  },800);
}

function buildMediaGrid(c) {
  const count=Math.min(c.mediaCount,6);
  if(count===0) return '<div style="padding:4px 20px 14px;font-size:14px;color:var(--text-secondary)">No media shared</div>';
  const cells=[];
  for(let i=0;i<Math.min(count,5);i++){
    cells.push(`<div class="media-thumb" style="background:${thumbBg(i+(c.id*3))}" onclick="showToast('View media')"></div>`);
  }
  if(c.mediaCount>5){
    cells.push(`<div class="media-thumb" style="background:${thumbBg(5+(c.id*3))};position:relative;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="showToast('View all media')">
      <div style="position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:600;color:#fff">+${c.mediaCount-5}</div>
    </div>`);
  }
  return `<div class="prof-media-grid">${cells.join('')}</div>`;
}

function toggleMute(id) {
  if(mutedChats.has(id)) mutedChats.delete(id);
  else mutedChats.add(id);
  renderProfile();
  showToast(mutedChats.has(id)?'Notifications muted':'Notifications unmuted');
}
