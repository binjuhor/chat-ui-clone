<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WhatsApp</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep:       #111b21;
    --bg-sidebar:    #202c33;
    --bg-panel:      #222e35;
    --bg-input:      #2a3942;
    --bg-sent:       #005c4b;
    --bg-recv:       #202c33;
    --bg-hover:      #2a3942;
    --bg-selected:   #2a3942;
    --accent:        #00a884;
    --accent-dark:   #008069;
    --text-primary:  #e9edef;
    --text-secondary:#8696a0;
    --text-meta:     #53bdeb;
    --divider:       #2a3942;
    --search-bg:     #2a3942;
    --icon-color:    #aebac1;
    --unread-bg:     #00a884;
    --tick-blue:     #53bdeb;
    --font:          'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  html, body { height: 100%; background: var(--bg-deep); font-family: var(--font); overflow: hidden; }

  #app {
    display: flex;
    height: 100vh;
    width: 100%;
    max-width: 1600px;
    margin: 0 auto;
  }

  /* ── SIDEBAR ── */
  #sidebar {
    width: 420px;
    min-width: 320px;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    background: var(--bg-sidebar);
    border-right: 1px solid var(--divider);
  }

  /* Sidebar header */
  #sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    background: var(--bg-panel);
    height: 60px;
  }

  #my-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 600; color: #fff;
    cursor: pointer; user-select: none; flex-shrink: 0;
  }

  .header-icons { display: flex; gap: 6px; }

  .icon-btn {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: none; border: none;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: background 0.15s;
    color: var(--icon-color);
  }
  .icon-btn:hover { background: var(--bg-hover); }

  /* Search */
  #search-wrap {
    padding: 8px 12px;
    background: var(--bg-sidebar);
  }

  #search-inner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--search-bg);
    border-radius: 8px;
    padding: 0 12px;
    height: 35px;
  }

  #search-inner svg { flex-shrink: 0; color: var(--text-secondary); }

  #search-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 15px;
    font-family: var(--font);
    caret-color: var(--accent);
  }
  #search-input::placeholder { color: var(--text-secondary); }

  /* Filter tabs */
  #filter-tabs {
    display: flex;
    gap: 8px;
    padding: 4px 12px 8px;
    background: var(--bg-sidebar);
    overflow-x: auto;
    scrollbar-width: none;
  }
  #filter-tabs::-webkit-scrollbar { display: none; }

  .filter-tab {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 16px;
    border: none;
    font-size: 13px;
    font-family: var(--font);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    background: var(--bg-input);
    color: var(--text-secondary);
  }
  .filter-tab.active {
    background: #2d4a39;
    color: var(--accent);
  }

  /* Chat list */
  #chat-list {
    flex: 1;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-input) transparent;
  }
  #chat-list::-webkit-scrollbar { width: 6px; }
  #chat-list::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 3px; }

  .chat-item {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    gap: 12px;
    cursor: pointer;
    transition: background 0.1s;
    border-bottom: 1px solid transparent;
    position: relative;
  }
  .chat-item:hover { background: var(--bg-hover); }
  .chat-item.selected { background: var(--bg-selected); }
  .chat-item.selected::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
  }

  .chat-avatar {
    width: 49px; height: 49px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 600; color: #fff;
    flex-shrink: 0; overflow: hidden; font-family: var(--font);
  }

  .chat-body { flex: 1; min-width: 0; }

  .chat-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 3px;
  }

  .chat-name {
    font-size: 16px;
    color: var(--text-primary);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 220px;
  }

  .chat-time {
    font-size: 12px;
    color: var(--text-secondary);
    flex-shrink: 0;
    margin-left: 8px;
  }
  .chat-item.unread .chat-time { color: var(--accent); }

  .chat-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .chat-preview {
    font-size: 14px;
    color: var(--text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 260px;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .chat-preview.muted { color: #6b7c85; }

  .unread-badge {
    min-width: 20px; height: 20px;
    background: var(--accent);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600;
    color: #fff;
    padding: 0 5px;
    flex-shrink: 0;
  }

  .muted-icon { color: var(--text-secondary); opacity: 0.7; }

  /* ── MAIN PANEL ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: var(--bg-deep);
    position: relative;
    overflow: hidden;
  }

  /* Wallpaper pattern */
  #main::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='400' height='400' viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23182229' fill-opacity='1'%3E%3Cpath d='M10 10 Q15 5 20 10 Q15 15 10 10z' opacity='.4'/%3E%3Cpath d='M50 30 Q55 25 60 30 Q55 35 50 30z' opacity='.3'/%3E%3Cpath d='M90 15 Q95 10 100 15 Q95 20 90 15z' opacity='.35'/%3E%3Cpath d='M140 25 Q145 20 150 25 Q145 30 140 25z' opacity='.4'/%3E%3Cpath d='M180 10 Q185 5 190 10 Q185 15 180 10z' opacity='.3'/%3E%3Cpath d='M230 20 Q235 15 240 20 Q235 25 230 20z' opacity='.35'/%3E%3Cpath d='M270 8 Q275 3 280 8 Q275 13 270 8z' opacity='.4'/%3E%3Cpath d='M320 18 Q325 13 330 18 Q325 23 320 18z' opacity='.3'/%3E%3Cpath d='M360 10 Q365 5 370 10 Q365 15 360 10z' opacity='.35'/%3E%3Cpath d='M30 60 Q35 55 40 60 Q35 65 30 60z' opacity='.35'/%3E%3Cpath d='M70 50 Q75 45 80 50 Q75 55 70 50z' opacity='.4'/%3E%3Cpath d='M120 65 Q125 60 130 65 Q125 70 120 65z' opacity='.3'/%3E%3Cpath d='M160 48 Q165 43 170 48 Q165 53 160 48z' opacity='.4'/%3E%3Cpath d='M200 60 Q205 55 210 60 Q205 65 200 60z' opacity='.35'/%3E%3Cpath d='M250 52 Q255 47 260 52 Q255 57 250 52z' opacity='.3'/%3E%3Cpath d='M290 62 Q295 57 300 62 Q295 67 290 62z' opacity='.4'/%3E%3Cpath d='M340 50 Q345 45 350 50 Q345 55 340 50z' opacity='.35'/%3E%3Cpath d='M380 58 Q385 53 390 58 Q385 63 380 58z' opacity='.3'/%3E%3C/g%3E%3C/svg%3E");
    background-size: 400px 400px;
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }

  /* Chat header */
  #chat-header {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    background: var(--bg-panel);
    height: 60px;
    gap: 12px;
    z-index: 10;
    position: relative;
    border-bottom: 1px solid var(--divider);
  }

  #active-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px; font-weight: 600; color: #fff;
    flex-shrink: 0; cursor: pointer;
  }

  #contact-info { flex: 1; cursor: pointer; }
  #contact-name { font-size: 16px; color: var(--text-primary); font-weight: 500; }
  #contact-status { font-size: 13px; color: var(--text-secondary); margin-top: 1px; }

  .chat-header-icons { display: flex; gap: 4px; }

  /* Messages area */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 12px 6% 12px;
    display: flex;
    flex-direction: column;
    gap: 2px;
    position: relative;
    z-index: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--bg-input) transparent;
  }
  #messages::-webkit-scrollbar { width: 6px; }
  #messages::-webkit-scrollbar-thumb { background: var(--bg-input); border-radius: 3px; }

  /* Date separator */
  .date-separator {
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px 0;
  }
  .date-chip {
    background: #182229;
    color: var(--text-secondary);
    font-size: 12.5px;
    padding: 5px 12px;
    border-radius: 8px;
    box-shadow: 0 1px 3px rgba(0,0,0,.3);
  }

  /* Message bubbles */
  .msg-row {
    display: flex;
    margin: 1px 0;
  }
  .msg-row.sent { justify-content: flex-end; }
  .msg-row.recv { justify-content: flex-start; }

  .bubble {
    max-width: 65%;
    min-width: 80px;
    padding: 6px 7px 8px 9px;
    border-radius: 7.5px;
    position: relative;
    word-break: break-word;
    box-shadow: 0 1px 2px rgba(0,0,0,.3);
  }

  .msg-row.sent .bubble {
    background: var(--bg-sent);
    border-top-right-radius: 0;
  }
  .msg-row.recv .bubble {
    background: var(--bg-recv);
    border-top-left-radius: 0;
  }

  /* Tail for sent */
  .msg-row.sent .bubble::after {
    content: '';
    position: absolute;
    top: 0; right: -8px;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 0 8px 8px;
    border-color: transparent transparent transparent var(--bg-sent);
  }
  /* Tail for recv */
  .msg-row.recv .bubble::before {
    content: '';
    position: absolute;
    top: 0; left: -8px;
    width: 0; height: 0;
    border-style: solid;
    border-width: 0 8px 8px 0;
    border-color: transparent var(--bg-recv) transparent transparent;
  }

  .bubble-text {
    font-size: 14.2px;
    color: var(--text-primary);
    line-height: 1.45;
    padding-right: 48px;
  }

  .bubble-meta {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 3px;
    margin-top: -6px;
    float: right;
    clear: both;
    margin-left: 8px;
  }

  .msg-time {
    font-size: 11px;
    color: rgba(233,237,239,0.6);
    white-space: nowrap;
  }
  .msg-row.recv .msg-time { color: var(--text-secondary); }

  .tick { display: flex; align-items: center; }
  .tick.read svg path, .tick.read svg polyline { stroke: var(--tick-blue); }

  /* Group of same sender — reduce top gap */
  .msg-row + .msg-row.sent { margin-top: 1px; }
  .msg-row + .msg-row.recv { margin-top: 1px; }

  .msg-row.sent + .msg-row.recv,
  .msg-row.recv + .msg-row.sent { margin-top: 6px; }

  /* Emoji-only messages */
  .bubble.emoji-only .bubble-text {
    font-size: 32px;
    padding-right: 48px;
    line-height: 1.2;
  }

  /* Replied message */
  .reply-preview {
    background: rgba(0,0,0,.2);
    border-left: 4px solid var(--accent);
    border-radius: 4px;
    padding: 5px 8px;
    margin-bottom: 5px;
    font-size: 13px;
  }
  .reply-author { color: var(--accent); font-weight: 500; margin-bottom: 2px; }
  .reply-text { color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Input area */
  #input-area {
    display: flex;
    align-items: flex-end;
    padding: 8px 16px 10px;
    gap: 10px;
    background: var(--bg-panel);
    position: relative;
    z-index: 10;
  }

  #input-wrap {
    flex: 1;
    display: flex;
    align-items: flex-end;
    background: var(--bg-input);
    border-radius: 10px;
    padding: 6px 10px;
    gap: 8px;
    min-height: 42px;
  }

  #msg-input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text-primary);
    font-size: 15px;
    font-family: var(--font);
    resize: none;
    max-height: 140px;
    overflow-y: auto;
    line-height: 1.5;
    caret-color: var(--accent);
    scrollbar-width: thin;
    scrollbar-color: var(--divider) transparent;
    padding: 3px 0;
  }
  #msg-input::placeholder { color: var(--text-secondary); }

  .input-icon-btn {
    background: none; border: none;
    cursor: pointer; color: var(--icon-color);
    display: flex; align-items: center; justify-content: center;
    width: 28px; height: 28px;
    border-radius: 50%;
    transition: color 0.15s;
    flex-shrink: 0;
    padding-bottom: 2px;
  }
  .input-icon-btn:hover { color: var(--text-primary); }

  #send-btn {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 2px 8px rgba(0,168,132,.3);
  }
  #send-btn:hover { background: var(--accent-dark); }
  #send-btn:active { transform: scale(0.94); }
  #send-btn svg { color: #fff; }

  /* Welcome screen (no active chat) */
  #welcome {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 1;
    position: relative;
    text-align: center;
  }
  #welcome svg { opacity: 0.15; }
  #welcome h2 { font-size: 32px; color: var(--text-primary); font-weight: 300; opacity: 0.9; }
  #welcome p { font-size: 14px; color: var(--text-secondary); max-width: 360px; line-height: 1.7; }
  #welcome-dot {
    width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.5); opacity: 0.6; } }

  /* Typing indicator */
  .typing-indicator {
    display: flex; gap: 4px; align-items: center; padding: 4px 0;
  }
  .typing-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-secondary);
    animation: typingBounce 1.2s ease-in-out infinite;
  }
  .typing-dot:nth-child(2) { animation-delay: 0.15s; }
  .typing-dot:nth-child(3) { animation-delay: 0.3s; }
  @keyframes typingBounce {
    0%,60%,100% { transform: translateY(0); }
    30% { transform: translateY(-6px); }
  }

  /* Emoji picker (simple) */
  #emoji-picker {
    position: absolute;
    bottom: 65px;
    left: 16px;
    background: var(--bg-panel);
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,.5);
    padding: 12px;
    display: none;
    z-index: 100;
    width: 320px;
    border: 1px solid var(--divider);
  }
  #emoji-picker.open { display: block; animation: popUp 0.15s ease; }
  @keyframes popUp { from { opacity: 0; transform: scale(0.95) translateY(8px); } to { opacity: 1; transform: none; } }

  .emoji-grid {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 4px;
  }
  .emoji-btn {
    background: none; border: none;
    font-size: 22px; cursor: pointer;
    padding: 6px;
    border-radius: 6px;
    transition: background 0.12s;
    text-align: center;
  }
  .emoji-btn:hover { background: var(--bg-hover); }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--bg-panel);
    color: var(--text-primary);
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 14px;
    box-shadow: 0 4px 20px rgba(0,0,0,.4);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 999;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { width: 100%; max-width: 100%; }
    #main { display: none; }
    #sidebar.hide { display: none; }
    #main.show { display: flex; width: 100%; }
    #chat-header .back-btn { display: flex !important; }
  }

  .back-btn { display: none; }

  /* Scrollbar for messages */
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 2px; }

  /* New message animation */
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .msg-row.new { animation: fadeSlideIn 0.18s ease forwards; }

  /* Status dots */
  .status-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    position: absolute;
    bottom: 1px; right: 1px;
    border: 2px solid var(--bg-panel);
  }
  .status-dot.online  { background: var(--accent); }
  .status-dot.away    { background: #f0c047; }
  .status-dot.offline { background: transparent; }

  .avatar-wrap { position: relative; flex-shrink: 0; }

  /* Section dividers in chat list */
  .list-section-label {
    padding: 6px 16px 4px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div id="app">

  <!-- ════════════════════ SIDEBAR ════════════════════ -->
  <div id="sidebar">

    <!-- Header -->
    <div id="sidebar-header">
      <div id="my-avatar" title="Profile">Y</div>
      <div class="header-icons">
        <button class="icon-btn" title="Communities" onclick="showToast('Communities coming soon')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="17" cy="7" r="3"/><circle cx="7" cy="7" r="3"/>
            <path d="M1 21v-2a4 4 0 014-4h4M13 21v-2a4 4 0 014-4h4M8 21v-2a4 4 0 014-4h0a4 4 0 014 4v2"/>
          </svg>
        </button>
        <button class="icon-btn" title="New chat" onclick="showToast('Start a new chat')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
            <line x1="12" y1="8" x2="12" y2="14"/><line x1="9" y1="11" x2="15" y2="11"/>
          </svg>
        </button>
        <button class="icon-btn" title="Menu">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Search -->
    <div id="search-wrap">
      <div id="search-inner">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input id="search-input" type="text" placeholder="Search or start new chat" oninput="filterChats(this.value)">
      </div>
    </div>

    <!-- Filter tabs -->
    <div id="filter-tabs">
      <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
      <button class="filter-tab" onclick="setFilter('unread', this)">Unread</button>
      <button class="filter-tab" onclick="setFilter('favorites', this)">Favorites</button>
      <button class="filter-tab" onclick="setFilter('groups', this)">Groups</button>
    </div>

    <!-- Chat list -->
    <div id="chat-list"></div>
  </div>

  <!-- ════════════════════ MAIN PANEL ════════════════════ -->
  <div id="main">

    <!-- Chat header -->
    <div id="chat-header" style="display:none">
      <button class="icon-btn back-btn" onclick="goBack()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>
      <div class="avatar-wrap">
        <div id="active-avatar"></div>
        <div id="active-status-dot" class="status-dot"></div>
      </div>
      <div id="contact-info">
        <div id="contact-name"></div>
        <div id="contact-status"></div>
      </div>
      <div class="chat-header-icons">
        <button class="icon-btn" title="Video call" onclick="showToast('Video call started')">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>

// ── RENDER SIDEBAR ────────────────────────────────
function renderChatList() {
  const list = document.getElementById('chat-list');

  if (searchQ) {
    items = items.filter(c => c.name.toLowerCase().includes(searchQ.toLowerCase()) ||
      c.messages.some(m => m.text.toLowerCase().includes(searchQ.toLowerCase())));
  }
  if (filter === 'unread') items = items.filter(c => c.unread > 0);
  if (filter === 'favorites') items = items.filter(c => c.favorite);
  if (filter === 'groups') items = items.filter(c => c.group);

  list.innerHTML = items.map(chat => {
    const isSelected = activeChat && activeChat.id === chat.id;
    const lastMsg = chat.messages[chat.messages.length - 1];
    const isMe = lastMsg.from === 'me';
    const tickSvg = `<svg width="14" height="10" viewBox="0 0 16 11" fill="none" style="flex-shrink:0">
      <polyline points="1,6 5,10 15,1" stroke="${chat.unread===0&&isMe?'#53bdeb':'#aebac1'}" stroke-width="2" fill="none" stroke-linecap="round"/>

// ── RENDER MESSAGES ───────────────────────────────
function groupByDate(msgs) {
  const groups = [];
  let lastDate = null;
  msgs.forEach(msg => {
    const d = new Date(msg.time); d.setHours(0,0,0,0);
    const key = d.toDateString();
    if (key !== lastDate) {
      const today = new Date(); today.setHours(0,0,0,0);
      const yest = new Date(today); yest.setDate(yest.getDate()-1);
      let label = d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
      if (d.toDateString() === today.toDateString()) label = 'Today';
      else if (d.toDateString() === yest.toDateString()) label = 'Yesterday';
      groups.push({type:'date', label});
      lastDate = key;
    }
    groups.push({type:'msg', msg});
  });
  return groups;
}

const isEmojiOnly = t => /^[\p{Emoji}\s]{1,5}$/u.test(t.trim()) && t.trim().length <= 8;

function renderMessages() {
  const container = document.getElementById('messages');
  const groups = groupByDate(activeChat.messages);

  container.innerHTML = groups.map(item => {
    if (item.type === 'date') return `<div class="date-separator"><div class="date-chip">${item.label}</div></div>`;
    const m = item.msg;
    const emojiOnly = isEmojiOnly(m.text);
    const senderLine = m.sender ? `<div style="color:${color(m.sender)};font-size:13px;font-weight:600;margin-bottom:3px">${m.sender}</div>` : '';
    const tick = m.from === 'me' ? `<span class="tick${m.read?' read':''}">
      <svg width="16" height="10" viewBox="0 0 18 11" fill="none">
        <polyline points="1,6 5.5,10.5 17,1" stroke="${m.read?'#53bdeb':'#aebac1'}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="5,6 9.5,10.5 17,1" stroke="${m.read?'#53bdeb':'#aebac1'}" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round" style="transform:translateX(-3px)"/>
      </svg></span>` : '';
    return `<div class="msg-row ${m.from==='me'?'sent':'recv'}">
      <div class="bubble${emojiOnly?' emoji-only':''}">
        ${senderLine}
        <div class="bubble-text">${escapeHtml(m.text)}</div>
        <div class="bubble-meta">
          <span class="msg-time">${formatMsgTime(m.time)}</span>
          ${tick}
        </div>
      </div>
    </div>`;
  }).join('');

  container.scrollTop = container.scrollHeight;
}

// ── SEND MESSAGE ──────────────────────────────────
function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !activeChat) return;

  const newMsg = { id: Date.now(), from:'me', text, time: new Date(), read: false };
  activeChat.messages.push(newMsg);
  activeChat.preview = text;
  activeChat.time = new Date();

  input.value = '';
  input.style.height = 'auto';
  closeEmoji();
  renderMessages();

  // Mark last row as new
  const rows = document.querySelectorAll('#messages .msg-row');
  const lastRow = rows[rows.length - 1];
  if (lastRow) lastRow.classList.add('new');

  // Update preview in sidebar
  renderChatList();

  // Simulate typing + reply
  if (!activeChat.group) simulateReply();
}

function simulateReply() {
  setTimeout(() => {
    const typingRow = document.createElement('div');
    typingRow.className = 'msg-row recv';
    typingRow.id = 'typing-row';
    typingRow.innerHTML = `<div class="bubble">
      <div class="typing-indicator">
        <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
      </div>
    </div>`;
    document.getElementById('messages').appendChild(typingRow);
    document.getElementById('messages').scrollTop = 9999;

    const replies = [
      "Got it! 👍","Sounds good to me!","Haha yeah exactly 😄","For sure, let me know!",
      "That makes sense","Oh interesting!","I'll check and get back to you","Perfect!",
      "Can we talk about this later?","Sure thing! 🙌","Makes total sense","Noted ✅"
    ];
    setTimeout(() => {
      const old = document.getElementById('typing-row');
      if (old) old.remove();
      const replyText = replies[Math.floor(Math.random() * replies.length)];
      const replyMsg = { id: Date.now()+1, from:'them', text: replyText, time: new Date() };
      activeChat.messages.push(replyMsg);
      activeChat.preview = replyText;
      activeChat.time = new Date();
      renderMessages();
      renderChatList();
    }, 1200 + Math.random() * 800);
  }, 800);
}

function handleKey(e) {

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function escapeHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\n/g,'<br>');
}

function filterChats(q) { searchQ = q; renderChatList(); }

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderChatList();
}

function goBack() {
  document.getElementById('sidebar').classList.remove('hide');
  document.getElementById('main').classList.remove('show');
  activeChat = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

  const inp = document.getElementById('msg-input');
  inp.value += e;
  inp.focus();
  autoResize(inp);
  closeEmoji();
}

document.addEventListener('click', e => {
  const picker = document.getElementById('emoji-picker');
  const btn = document.getElementById('emoji-toggle-btn');
  if (picker.classList.contains('open') && !picker.contains(e.target) && e.target !== btn && !btn.contains(e.target)) {
    closeEmoji();
  }
});

// ── INIT ──────────────────────────────────────────
initEmoji();
renderChatList();
// Auto-open first chat
openChat(1);
</script>
</body>
</html>
