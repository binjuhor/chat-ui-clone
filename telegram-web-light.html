<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram (Light)</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-deep:     #f1f3f4;
  --bg-sidebar:  #ffffff;
  --bg-panel:    #ffffff;
  --bg-sent:     #efffde;
  --bg-recv:     #ffffff;
  --bg-hover:    #f1f3f4;
  --bg-selected: #e8f1ff;
  --accent:      #2481cc;
  --accent-dark: #1a6fb5;
  --text-pri:    #222222;
  --text-sec:    #707579;
  --text-blue:   #2481cc;
  --divider:     rgba(0,0,0,0.1);
  --icon:        #707579;
  --online:      #4dcd5e;
  --missed:      #e54949;
  --font:        -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
}

html, body { height: 100%; background: var(--bg-deep); font-family: var(--font); overflow: hidden; }

#app { display: flex; height: 100vh; width: 100%; }

/* ── SIDEBAR ── */
#sidebar {
  width: 340px; min-width: 280px; max-width: 340px;
  display: flex; flex-direction: column;
  background: var(--bg-sidebar);
  border-right: 1px solid var(--divider);
  flex-shrink: 0;
}

#sidebar-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 12px; height: 56px; background: var(--bg-panel);
}

.header-left { display: flex; align-items: center; gap: 8px; }
.header-title { font-size: 17px; font-weight: 600; color: var(--text-pri); }
.header-right { display: flex; align-items: center; gap: 2px; }

.icon-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: none; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: var(--icon); transition: background 0.15s;
}
.icon-btn:hover { background: var(--bg-hover); }

#search-wrap { padding: 8px 12px; background: var(--bg-panel); border-bottom: 1px solid var(--divider); }
.search-inner { position: relative; }
.search-icon-pos { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--icon); pointer-events: none; }

#search-input {
  width: 100%; background: var(--bg-deep); border: none; border-radius: 20px;
  padding: 8px 12px 8px 34px; color: var(--text-pri); font-size: 15px; outline: none;
}
#search-input::placeholder { color: var(--text-sec); }

#filter-tabs {
  display: flex; gap: 6px; padding: 8px 12px;
  background: var(--bg-panel); border-bottom: 1px solid var(--divider);
  overflow-x: auto; scrollbar-width: none;
}
#filter-tabs::-webkit-scrollbar { display: none; }

.ftab {
  padding: 5px 14px; border-radius: 16px; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap; border: none;
  background: var(--bg-hover); color: var(--text-sec);
  transition: all 0.15s; flex-shrink: 0;
}
.ftab.active { background: var(--accent); color: #fff; }

#chat-list { flex: 1; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--bg-hover) transparent; }
#chat-list::-webkit-scrollbar { width: 4px; }
#chat-list::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

.chat-item {
  display: flex; align-items: center; padding: 8px 12px; gap: 10px;
  cursor: pointer; transition: background 0.12s;
}
.chat-item:hover { background: var(--bg-hover); }
.chat-item.active { background: var(--bg-selected); }

.avatar {
  width: 50px; height: 50px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; color: #fff; flex-shrink: 0; position: relative;
  font-size: 18px;
}
.avatar .dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--online); border: 2px solid var(--bg-sidebar);
}

.chat-content { flex: 1; min-width: 0; }
.chat-r1 { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2px; }
.chat-name {
  font-size: 15px; font-weight: 500; color: var(--text-pri);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; gap: 4px;
}
.chat-time { font-size: 12px; color: var(--text-sec); flex-shrink: 0; margin-left: 4px; }
.chat-time.unread-t { color: var(--accent); }
.chat-r2 { display: flex; align-items: center; justify-content: space-between; }
.chat-prev {
  font-size: 13.5px; color: var(--text-sec);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1;
}
.chat-badges { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: 6px; }
.ubadge {
  min-width: 20px; height: 20px; border-radius: 10px;
  background: var(--accent); color: #fff; font-size: 11px; font-weight: 600;
  display: flex; align-items: center; justify-content: center; padding: 0 5px;
}
.ubadge.muted { background: var(--text-sec); }

/* ── MAIN ── */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; background: var(--bg-deep); position: relative; }

#empty-state {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
}
.empty-icon {
  width: 96px; height: 96px; border-radius: 50%;
  background: var(--bg-hover); display: flex; align-items: center; justify-content: center;
}
.empty-title { font-size: 20px; font-weight: 600; color: var(--text-pri); }
.empty-sub { font-size: 14px; color: var(--text-sec); }

#chat-view { flex: 1; display: none; flex-direction: column; min-height: 0; }
#chat-view.open { display: flex; }

/* Chat header */
#chat-header {
  display: flex; align-items: center; padding: 8px 12px;
  background: var(--bg-panel); height: 56px;
  border-bottom: 1px solid var(--divider); gap: 10px; flex-shrink: 0;
}
#back-btn { display: none; }

#h-avatar {
  width: 40px; height: 40px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.h-info { flex: 1; min-width: 0; cursor: pointer; }
.h-name { font-size: 16px; font-weight: 600; color: var(--text-pri); display: flex; align-items: center; gap: 5px; }
.h-status { font-size: 13px; color: var(--text-sec); }
.h-status.on { color: var(--accent); }
.h-actions { display: flex; align-items: center; gap: 2px; }

/* Messages */
#msgs {
  flex: 1; overflow-y: auto; padding: 10px 16px;
  display: flex; flex-direction: column; gap: 10px;
  scrollbar-width: thin; scrollbar-color: var(--bg-hover) transparent;
  background-color: var(--bg-deep);
  background-image:
    radial-gradient(ellipse at 15% 40%, rgba(36,129,204,0.04) 0%, transparent 55%),
    radial-gradient(ellipse at 85% 70%, rgba(36,129,204,0.03) 0%, transparent 50%);
}
#msgs::-webkit-scrollbar { width: 4px; }
#msgs::-webkit-scrollbar-thumb { background: var(--bg-hover); border-radius: 4px; }

/* Date / system */
.date-sep { display: flex; justify-content: center; margin: 8px 0; }
.date-sep span {
  background: rgba(255,255,255,0.92); color: var(--text-sec);
  font-size: 12px; padding: 4px 10px; border-radius: 12px;
}
.sys-msg { display: flex; justify-content: center; margin: 4px 0; }
.sys-msg span {
  background: rgba(255,255,255,0.92); color: var(--text-sec);
  font-size: 13px; padding: 4px 12px; border-radius: 12px;
}

/* Bubbles */
.mrow { display: flex; margin-bottom: 1px; align-items: flex-end; gap: 4px; }
.mrow.sent { justify-content: flex-end; }
.mrow.recv { justify-content: flex-start; }
.mrow.gstart { margin-top: 5px; }

.bubble {
  max-width: 460px; min-width: 80px; border-radius: 12px;
  padding: 6px 10px; position: relative; word-break: break-word;
}
.mrow.sent .bubble { background: var(--bg-sent); border-bottom-right-radius: 4px; }
.mrow.recv .bubble { background: var(--bg-recv); border-bottom-left-radius: 4px; }
.mrow.notail.sent .bubble { border-bottom-right-radius: 12px; }
.mrow.notail.recv .bubble { border-bottom-left-radius: 12px; }

.bubble::after { content: ''; position: absolute; bottom: 0; width: 0; height: 0; }
.mrow.sent .bubble::after { right: -6px; border-left: 7px solid var(--bg-sent); border-bottom: 6px solid transparent; }
.mrow.recv .bubble::after { left: -6px; border-right: 7px solid var(--bg-recv); border-bottom: 6px solid transparent; }
.mrow.notail .bubble::after { display: none; }

.msg-avatar-sm {
  width: 32px; height: 32px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0;
}
.msg-avatar-sm.invis { visibility: hidden; }

.sender-name { font-size: 13px; font-weight: 600; margin-bottom: 3px; }
.msg-text { font-size: 14.5px; color: var(--text-pri); line-height: 1.45; }

.meta {
  display: flex; align-items: center; justify-content: flex-end;
  gap: 3px; margin-top: 2px; height: 16px;
}
.meta-time { font-size: 11px; color: rgba(200,209,219,0.45); }

/* Reply quote */
.rquote {
  border-left: 3px solid var(--accent); padding: 3px 8px;
  margin-bottom: 4px; border-radius: 0 4px 4px 0;
  background: rgba(36,129,204,0.12);
}
.rquote-name { font-size: 12px; font-weight: 600; color: var(--text-blue); margin-bottom: 1px; }
.rquote-text { font-size: 12px; color: var(--text-sec); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 260px; }

/* Forward */
.fwd-label {
  display: flex; align-items: center; gap: 5px;
  font-size: 12.5px; color: var(--text-blue); font-weight: 500; margin-bottom: 4px;
}

/* Sticker */
.sticker-bubble { background: transparent !important; padding: 2px !important; border-radius: 0 !important; }
.sticker-bubble::after { display: none !important; }
.sticker-emoji { font-size: 72px; line-height: 1.1; display: block; }

/* Image */
.img-msg {
  width: calc(100% + 8px); border-radius: 8px; overflow: hidden;
  margin: -4px -4px; cursor: zoom-in; position: relative;
}
.img-thumb {
  width: 100%; height: 196px; display: flex;
  align-items: center; justify-content: center; position: relative;
}
.img-caption { padding: 5px 8px 2px; font-size: 14px; color: var(--text-pri); }
.img-overlay-meta {
  position: absolute; bottom: 7px; right: 8px;
  background: rgba(0,0,0,0.45); border-radius: 10px;
  padding: 2px 7px; display: flex; align-items: center; gap: 3px;
}
.img-overlay-meta .meta-time { color: rgba(255,255,255,0.85); }

/* Video */
.video-msg {
  width: calc(100% + 8px); height: 196px; border-radius: 8px; overflow: hidden;
  margin: -4px -4px; cursor: pointer; position: relative;
}
.video-thumb { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; }
.play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: rgba(0,0,0,0.55); display: flex; align-items: center; justify-content: center; z-index: 2;
}
.video-dur {
  position: absolute; bottom: 8px; right: 8px;
  background: rgba(0,0,0,0.5); color: #fff; font-size: 12px;
  padding: 2px 7px; border-radius: 10px; z-index: 2;
}

/* Voice */
.voice-msg { display: flex; align-items: center; gap: 10px; min-width: 220px; padding: 2px 0; }
.v-play {
  width: 42px; height: 42px; border-radius: 50%;
  background: var(--accent); display: flex; align-items: center;
  justify-content: center; cursor: pointer; flex-shrink: 0;
  transition: background 0.15s;
}
.v-play:hover { background: var(--accent-dark); }
.waveform { display: flex; align-items: center; gap: 2px; flex: 1; height: 30px; cursor: pointer; }
.wbar { width: 3px; border-radius: 2px; background: rgba(200,209,219,0.3); flex-shrink: 0; transition: background 0.15s; }
.wbar.played { background: var(--accent); }
.v-dur { font-size: 12px; color: var(--text-sec); flex-shrink: 0; }

/* Call */
.call-bubble { display: flex; align-items: center; gap: 10px; min-width: 190px; padding: 2px 0; cursor: pointer; }
.call-ico {
  width: 42px; height: 42px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.call-ico.inc  { background: rgba(77,205,94,0.2); }
.call-ico.out  { background: rgba(36,129,204,0.2); }
.call-ico.miss { background: rgba(229,73,73,0.2); }
.call-info { flex: 1; }
.call-title { font-size: 14.5px; font-weight: 500; color: var(--text-pri); }
.call-title.miss { color: var(--missed); }
.call-sub { font-size: 12px; color: var(--text-sec); margin-top: 2px; display: flex; align-items: center; gap: 4px; }

/* Typing */
#typing { padding: 2px 16px 8px; display: none; }
.typing-bbl {
  background: var(--bg-recv); border-radius: 12px; border-bottom-left-radius: 4px;
  padding: 10px 14px; display: inline-flex; align-items: center; gap: 4px;
}
.tdot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--text-sec); animation: tbounce 1.2s infinite;
}
.tdot:nth-child(2) { animation-delay: 0.2s; }
.tdot:nth-child(3) { animation-delay: 0.4s; }
@keyframes tbounce {
  0%,60%,100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-5px); opacity: 1; }
}

/* Input */
#input-area {
  background: var(--bg-panel); padding: 8px 12px;
  display: flex; align-items: flex-end; gap: 8px;
  border-top: 1px solid var(--divider); flex-shrink: 0; position: relative;
}
#msg-input {
  flex: 1; background: var(--bg-deep); border: none; border-radius: 20px;
  padding: 10px 16px; color: var(--text-pri); font-size: 16px; outline: none;
  resize: none; max-height: 140px; min-height: 42px;
  font-family: var(--font); line-height: 1.45; scrollbar-width: none;
}
#msg-input::-webkit-scrollbar { display: none; }
#msg-input::placeholder { color: var(--text-sec); }

.in-btn {
  width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: background 0.15s, transform 0.1s;
}
.in-btn.ghost { background: none; color: var(--icon); }
.in-btn.ghost:hover { background: var(--bg-hover); }
.in-btn.primary { background: var(--accent); color: #fff; }
.in-btn.primary:hover { background: var(--accent-dark); }
.in-btn.primary:active { transform: scale(0.92); }

/* Emoji picker */
#emoji-picker {
  position: absolute; bottom: 66px; right: 12px;
  background: var(--bg-panel); border: 1px solid var(--divider); border-radius: 12px;
  padding: 12px; z-index: 100; display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
#emoji-picker.open { display: block; }
.egrid { display: grid; grid-template-columns: repeat(8, 36px); gap: 2px; }
.ebtn {
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  font-size: 22px; border-radius: 8px; cursor: pointer; background: none; border: none;
  transition: background 0.1s;
}
.ebtn:hover { background: var(--bg-hover); }

/* Slide-in animation */
@keyframes msgIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

/* Reactions */
.bubble-pos { position: relative; }
.reaction-bar {
  position: absolute; bottom: 100%; right: 0; margin-bottom: -6px;
  background: #fff; border: 1px solid var(--divider); border-radius: 24px;
  padding: 4px 8px; display: none; gap: 4px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12); z-index: 10; white-space: nowrap;
}
.bubble-pos:hover .reaction-bar { display: flex; }
.rbtn { font-size: 22px; cursor: pointer; padding: 2px 3px; border-radius: 8px; transition: transform 0.15s; background: none; border: none; }
.rbtn:hover { transform: scale(1.25); }
.reaction-badge {
  position: absolute; bottom: -16px; right: 6px;
  background: #fff; border: 1px solid var(--divider); border-radius: 12px;
  padding: 1px 6px; font-size: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
}
.new-msg { animation: msgIn 0.18s ease; }

/* Responsive */
@media (max-width: 768px) {
  #sidebar { width: 100%; max-width: 100%; }
  #sidebar.mob-hide { display: none; }
  #main { position: absolute; inset: 0; display: none; }
  #main.mob-show { display: flex; }
  #back-btn { display: flex !important; }
}
  .mrow.recv .bubble { border: 1px solid rgba(0,0,0,0.1); }
  .mrow.sent .meta-time { color: rgba(0,80,0,0.55); }
  .date-sep span, .sys-msg span { border: 1px solid rgba(0,0,0,0.08); }
  #msgs { background-image: none; }
#lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:9999; align-items:center; justify-content:center; cursor:zoom-out; }
#lb-img { width:min(560px,90vw); aspect-ratio:4/3; border-radius:14px; overflow:hidden; box-shadow:0 24px 80px rgba(0,0,0,.6); display:flex; align-items:center; justify-content:center; font-size:80px; animation:lb-pop 0.18s ease; }
@keyframes lb-pop { from { transform:scale(0.85); opacity:0 } to { transform:scale(1); opacity:1 } }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <div id="sidebar-header">
      <div class="header-left">
        <button class="icon-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="header-title">Telegram</span>
      </div>
      <div class="header-right">
        <button class="icon-btn" title="New message">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>
      </div>
    </div>
    <div id="search-wrap">
      <div class="search-inner">
        <svg class="search-icon-pos" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="search-input" type="text" placeholder="Search" autocomplete="off">
      </div>
    </div>
    <div id="filter-tabs">
      <button class="ftab active" data-f="all">All</button>
      <button class="ftab" data-f="personal">Personal</button>
      <button class="ftab" data-f="groups">Groups</button>
      <button class="ftab" data-f="channels">Channels</button>
      <button class="ftab" data-f="bots">Bots</button>
    </div>
    <div id="chat-list"></div>
  </div>

  <div id="main">
    <div id="empty-state">
      <div class="empty-icon">
        <svg width="52" height="52" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8l-1.69 7.96c-.12.56-.46.7-.94.43l-2.6-1.92-1.26 1.21c-.14.14-.26.26-.53.26l.19-2.67 4.85-4.38c.21-.19-.05-.29-.32-.1L7.58 14.4l-2.55-.8c-.55-.17-.56-.55.12-.82l9.97-3.84c.47-.17.88.11.72.86z" fill="#2481cc"/></svg>
      </div>
      <div class="empty-title">Telegram</div>
      <div class="empty-sub">Select a chat to start messaging</div>
    </div>

    <div id="chat-view">
      <div id="chat-header">
        <button class="icon-btn" id="back-btn" style="display:none;">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <div id="h-avatar"></div>
        <div class="h-info">
          <div class="h-name" id="h-name"></div>
          <div class="h-status" id="h-status"></div>
        </div>
        <div class="h-actions">
          <button class="icon-btn" title="Search in chat"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></button>
          <button class="icon-btn" title="Call"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg></button>
          <button class="icon-btn" title="Video call"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg></button>
          <button class="icon-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/></svg></button>

// State
let activeId = null;
let activeFilter = 'all';
let emojiOpen = false;

// ── Render chat list ──
function renderList(filter, search) {
  filter = filter || activeFilter;
  search = (search || '').toLowerCase();
  const list = document.getElementById('chat-list');

  let items = convs.filter(c => {
    if (search) return c.name.toLowerCase().includes(search) || c.last.toLowerCase().includes(search);
    if (filter === 'personal') return c.type === 'personal';
    if (filter === 'groups') return c.type === 'group';
    if (filter === 'channels') return c.type === 'channel';
    if (filter === 'bots') return c.type === 'bot';
    return true;
  });

  items = [...items.filter(c => c.pinned), ...items.filter(c => !c.pinned)];

  list.innerHTML = items.map(c => {
    const emo = c.av.t.length > 2 ? '20px' : '16px';
    const dotHtml = c.online ? '<div class="dot"></div>' : '';
    const vbadge = c.verified ? verBadge() : '';
    const badge = c.unread ? `<span class="ubadge${c.muted?' muted':''}">${c.unread}</span>` : '';
    const tc = c.unread && !c.muted ? 'unread-t' : '';
    return `
      <div class="chat-item${c.id===activeId?' active':''}" data-id="${c.id}">
        <div class="avatar" style="background:${c.av.bg};font-size:${emo}">${c.av.t}${dotHtml}</div>
        <div class="chat-content">
          <div class="chat-r1">
            <div class="chat-name">${c.name}${vbadge}</div>
            <div class="chat-time ${tc}">${c.lastT}</div>
          </div>
          <div class="chat-r2">
            <div class="chat-prev">${c.last}</div>
            <div class="chat-badges">${badge}</div>
          </div>
        </div>
      </div>`;
  }).join('');

  list.querySelectorAll('.chat-item').forEach(el => {
    el.addEventListener('click', () => openChat(+el.dataset.id));
  });
}

// ── Render messages ──
function renderMsgs(conv) {
  const area = document.getElementById('msgs');
  let html = '';
  const ms = conv.msgs;

  for (let i = 0; i < ms.length; i++) {
    const m = ms[i];
    const next = ms[i + 1];

    if (m.k === 'date') { html += `<div class="date-sep"><span>${m.text}</span></div>`; continue; }
    if (m.k === 'sys')  { html += `<div class="sys-msg"><span>${m.text}</span></div>`; continue; }
    if (m.k === 'call') { html += buildCall(m); continue; }

    const sent = m.k === 's';
    const dir = sent ? 'sent' : 'recv';
    const sameNext = next && next.k === m.k && next.sn === m.sn && next.k !== 'date' && next.k !== 'sys' && next.k !== 'call';
    const noTail = m.notail || sameNext;

    // Group avatar
    let avHtml = '';
    if (!sent && conv.isGroup) {
      const isLast = !sameNext;
      avHtml = isLast
        ? `<div class="msg-avatar-sm" style="background:${m.sc||'#666'}">${m.sa||'?'}</div>`
        : `<div class="msg-avatar-sm invis"></div>`;
    }

    let inner = '';

    // Sender name in group
    const samePrev = i > 0 && ms[i-1].k === m.k && ms[i-1].sn === m.sn;
    if (!sent && conv.isGroup && m.sn && !samePrev) {
      inner += `<div class="sender-name" style="color:${m.sc}">${m.sn}</div>`;
    }

    // Forward
    if (m.fwd) {
      inner += `<div class="fwd-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 10 20 15 15 20"/><path d="M4 4v7a4 4 0 0 0 4 4h12"/></svg>Forwarded from <strong>${m.fwd}</strong></div>`;
    }

    // Reply quote
    if (m.reply) {
      inner += `<div class="rquote"><div class="rquote-name">${m.reply.name}</div><div class="rquote-text">${m.reply.text}</div></div>`;
    }

    const mt = m.mt;

    if (mt === 'sticker') {
      html += `<div class="mrow ${dir}${noTail?' notail':''} gstart" style="align-items:flex-end;gap:4px;">${avHtml}<div class="bubble sticker-bubble"><span class="sticker-emoji">${m.emoji}</span><div class="meta"><span class="meta-time">${m.t}</span></div></div></div>`;
      continue;
    }

    if (mt === 'image') {
      inner += `<div class="img-msg" onclick="openLightbox('${m.grad}','🖼️')"><div class="img-thumb" style="background:${m.grad}"><svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg><div class="img-overlay-meta"><span class="meta-time">${m.t}</span>${sent?ticks(m.rd||'single'):''}</div></div>${m.cap?`<div class="img-caption">${m.cap}</div>`:''}</div>`;
      html += `<div class="mrow ${dir}${noTail?' notail':''} gstart" style="align-items:flex-end;gap:4px;">${avHtml}<div class="bubble" style="padding:4px;">${inner}</div></div>`;
      continue;
    }

    if (mt === 'video') {
      inner += `<div class="video-msg"><div class="video-thumb" style="background:${m.grad}"><div class="play-btn"><svg width="20" height="20" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><div class="video-dur">${m.dur||'0:30'}</div><div class="img-overlay-meta" style="bottom:7px;right:8px;"><span class="meta-time">${m.t}</span>${sent?ticks(m.rd||'single'):''}</div></div></div>`;
      html += `<div class="mrow ${dir}${noTail?' notail':''} gstart" style="align-items:flex-end;gap:4px;">${avHtml}<div class="bubble" style="padding:4px;">${inner}</div></div>`;
      continue;
    }

    if (mt === 'voice') {
      inner += `<div class="voice-msg"><div class="v-play"><svg width="16" height="16" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div><div class="waveform">${waveform()}</div><span class="v-dur">${m.dur||'0:30'}</span></div>`;
    } else if (m.text) {
      inner += `<div class="msg-text">${m.text.replace(/\n/g,'<br>')}</div>`;
    }

    inner += `<div class="meta"><span class="meta-time">${m.t}</span>${sent?ticks(m.rd||'single'):''}</div>`;
    const reactionBar = `<div class="reaction-bar">${REACTIONS.map(r=>`<button class="rbtn">${r}</button>`).join('')}</div>`;
    html += `<div class="mrow ${dir}${noTail?' notail':''} gstart" style="align-items:flex-end;gap:4px;">${avHtml}<div class="bubble-pos">${reactionBar}<div class="bubble">${inner}</div></div></div>`;
  }

  area.innerHTML = html;
  area.scrollTop = area.scrollHeight;

  // Waveform click
  area.querySelectorAll('.waveform').forEach(wf => {
    wf.addEventListener('click', () => {
      wf.querySelectorAll('.wbar').forEach((b, i) => {
        b.classList.toggle('played', i < 15);
      });
    });
  });

  // Reaction click
  area.querySelectorAll('.rbtn').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const pos = btn.closest('.bubble-pos');
      let badge = pos.querySelector('.reaction-badge');
      if (!badge) {
        badge = document.createElement('div');
        badge.className = 'reaction-badge';
        pos.querySelector('.bubble').appendChild(badge);
      }
      badge.textContent = btn.textContent + ' 1';
    });
  });
}

function buildCall(m) {
  const cfg = {
    incoming: { cls:'inc', label:'Incoming Call', color:'#4dcd5e', arrow:'↙', dur: m.dur },
    outgoing: { cls:'out', label:'Outgoing Call', color:'#2481cc', arrow:'↗', dur: m.dur },
    missed:   { cls:'miss', label:'Missed Call', color:'#e54949', arrow:'↙', dur: null },
  }[m.ct];

  const phoneIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z" stroke="${cfg.color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;

  const subText = cfg.dur ? `${cfg.arrow} ${cfg.dur}` : `${cfg.arrow} Tap to call back`;
  const isSent = m.ct === 'outgoing';

  return `<div class="mrow ${isSent?'sent':'recv'} gstart"><div class="bubble"><div class="call-bubble"><div class="call-ico ${cfg.cls}">${phoneIcon}</div><div class="call-info"><div class="call-title${m.ct==='missed'?' miss':''}">${cfg.label}</div><div class="call-sub">${subText}</div></div></div><div class="meta"><span class="meta-time">${m.t}</span>${isSent?ticks('blue'):''}</div></div></div>`;
}

// ── Open chat ──
function openChat(id) {
  activeId = id;
  const conv = convs.find(c => c.id === id);
  if (!conv) return;
  conv.unread = 0;

  document.getElementById('empty-state').style.display = 'none';
  document.getElementById('chat-view').classList.add('open');

  const hav = document.getElementById('h-avatar');
  hav.style.background = conv.av.bg;
  hav.textContent = conv.av.t;
  hav.style.fontSize = conv.av.t.length > 2 ? '18px' : '14px';

  const hn = document.getElementById('h-name');
  hn.innerHTML = conv.name + (conv.verified ? ` ${verBadge()}` : '');

  const hs = document.getElementById('h-status');
  hs.textContent = conv.status || '';
  hs.className = 'h-status' + (conv.online ? ' on' : '');

  renderMsgs(conv);
  renderList();

  if (window.innerWidth <= 768) {
    document.getElementById('sidebar').classList.add('mob-hide');
    document.getElementById('main').classList.add('mob-show');
    document.getElementById('back-btn').style.display = 'flex';
  }
}

// ── Send ──
function sendMsg() {
  const inp = document.getElementById('msg-input');
  const text = inp.value.trim();
  if (!text || !activeId) return;

  const conv = convs.find(c => c.id === activeId);
  if (!conv) return;

  conv.msgs.push({ k: 's', text, t: now(), rd: 'single' });
  conv.last = text;
  conv.lastT = now();

  inp.value = '';
  inp.style.height = '';
  updateSendBtn();

  renderMsgs(conv);
  renderList();

  const area = document.getElementById('msgs');
  const typing = document.getElementById('typing');

  setTimeout(() => { typing.style.display = 'block'; area.scrollTop = area.scrollHeight; }, 500);

  setTimeout(() => {
    typing.style.display = 'none';
    if (conv.type !== 'channel') {
      const replies = ['Got it, thanks!','Sounds great 👍','Makes sense!','On it 🚀','Absolutely!','Let me check that','Perfect, thanks!','Noted!'];
      const rep = replies[Math.floor(Math.random() * replies.length)];

      if (conv.isGroup && conv.msgs.some(m => m.sn)) {
        const snds = conv.msgs.filter(m => m.sn);
        const s = snds[Math.floor(Math.random() * snds.length)];
        conv.msgs.push({ k: 'r', sn: s.sn, sc: s.sc, sa: s.sa, text: rep, t: now() });
      } else {
        conv.msgs.push({ k: 'r', text: rep, t: now() });
      }
      conv.last = rep; conv.lastT = now();
      renderMsgs(conv); renderList();
    }
  }, 1200 + Math.random() * 800);
}

function now() {
  const d = new Date();
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function updateSendBtn() {
  const hasText = document.getElementById('msg-input').value.trim().length > 0;
  document.getElementById('send-icon').style.display = hasText ? '' : 'none';
  document.getElementById('mic-icon').style.display = hasText ? 'none' : '';
}

// ── Events ──
document.querySelectorAll('.ftab').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('.ftab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    activeFilter = b.dataset.f;
    renderList();
  });
});

document.getElementById('search-input').addEventListener('input', e => {
  renderList(activeFilter, e.target.value);
});

document.getElementById('send-btn').addEventListener('click', () => {
  const hasText = document.getElementById('msg-input').value.trim().length > 0;
  if (hasText) sendMsg();
});

document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = '';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  updateSendBtn();
});

document.getElementById('emoji-btn').addEventListener('click', e => {
  e.stopPropagation();
  emojiOpen = !emojiOpen;
  document.getElementById('emoji-picker').classList.toggle('open', emojiOpen);
});

document.addEventListener('click', () => {
  emojiOpen = false;
  document.getElementById('emoji-picker').classList.remove('open');
});
document.getElementById('emoji-picker').addEventListener('click', e => e.stopPropagation());

document.getElementById('back-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('mob-hide');
  document.getElementById('main').classList.remove('mob-show');
  document.getElementById('chat-view').classList.remove('open');
  document.getElementById('empty-state').style.display = 'flex';
  document.getElementById('back-btn').style.display = 'none';
  activeId = null;
  renderList();
});

// ── Init ──
document.getElementById('egrid').innerHTML = EMOJIS.map(e => `<button class="ebtn">${e}</button>`).join('');
document.querySelectorAll('.ebtn').forEach(b => {
  b.addEventListener('click', () => {
    const inp = document.getElementById('msg-input');
    inp.value += b.textContent;
    inp.focus();
    updateSendBtn();
    emojiOpen = false;
    document.getElementById('emoji-picker').classList.remove('open');
  });
});

updateSendBtn();
renderList('all');
openChat(1);

function openLightbox(grad, emoji) {
  const el = document.getElementById('lb-img');
  el.style.background = grad; el.textContent = emoji || '🖼️';
  document.getElementById('lightbox').style.display = 'flex';
}
function closeLightbox() { document.getElementById('lightbox').style.display = 'none'; }
document.addEventListener('keydown', e => { if(e.key==='Escape') closeLightbox(); });
</script>
